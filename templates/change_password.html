<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 小说创作助手</title>
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="{{ url_for('static', filename='cs.css') }}" />
    <style>
        :root {
            --bg: #0a0e17;
            --ink: #eaf1ff;
            --muted: #9aa9c6;
            --line: #26324c;
            --card: #121c2f;
            --accent: #ff7a45;
            --accent-2: #3ec5b8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            background:
                radial-gradient(1000px 460px at 84% -10%, rgba(62,197,184,0.18), rgba(62,197,184,0) 70%),
                radial-gradient(700px 320px at -8% 20%, rgba(255,122,69,0.22), rgba(255,122,69,0) 68%),
                linear-gradient(180deg, #0a0f19 0%, #070b12 100%);
            font-family: "Manrope", "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 14px;
        }
        .auth-wrapper {
            width: min(470px, 100%);
            padding: 28px;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--line);
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.35);
        }
        .auth-wrapper h2 { margin: 0 0 10px; color: var(--ink); }
        .auth-desc { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.7; }
        .auth-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .auth-field label { color: var(--muted); font-size: 14px; }
        .auth-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #304160;
            border-radius: 10px;
            font-size: 14px;
            background: #0e1626 !important;
            background-color: #0e1626 !important;
            color: var(--ink);
            -webkit-text-fill-color: var(--ink);
        }

        .auth-field input:-webkit-autofill,
        .auth-field input:-webkit-autofill:hover,
        .auth-field input:-webkit-autofill:focus,
        .auth-field input:-webkit-autofill:active {
            -webkit-text-fill-color: var(--ink);
            -webkit-box-shadow: 0 0 0 1000px #0e1626 inset;
            box-shadow: 0 0 0 1000px #0e1626 inset;
            transition: background-color 9999s ease-in-out 0s;
        }
        .auth-field input:focus {
            outline: none;
            border-color: #4f73b8;
            box-shadow: 0 0 0 3px rgba(79, 115, 184, 0.22);
        }
        .captcha-row { display: flex; gap: 10px; align-items: center; }
        .captcha-image {
            width: 140px;
            height: 44px;
            border: 1px solid #304160;
            border-radius: 10px;
            background: #0f1829;
        }
        .captcha-refresh {
            border: 1px solid #2e4268;
            background: #172541;
            color: #c8dbff;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
        }
        .auth-button {
            width: 100%;
            margin-top: 10px;
            border: none;
            border-radius: 999px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), #ff9a4d);
            box-shadow: 0 12px 30px rgba(255, 122, 69, 0.32);
            cursor: pointer;
        }
        .auth-footer { margin-top: 18px; color: var(--muted); font-size: 14px; text-align: center; }
        .auth-footer a { color: var(--accent-2); text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .message { margin-bottom: 14px; padding: 12px 14px; border-radius: 10px; font-size: 14px; border: 1px solid transparent; }
        .message.success { background: rgba(62, 197, 184, 0.14); color: #6ce9da; border-color: rgba(62, 197, 184, 0.4); }
        .message.danger { background: rgba(245, 95, 95, 0.14); color: #ff9999; border-color: rgba(245, 95, 95, 0.35); }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <h2>修改密码</h2>
        <p class="auth-desc">请填写用户名、当前密码和新密码。新密码需至少 10 位，并包含大小写字母、数字和特殊字符。</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <div class="auth-field">
                <label for="username">用户名</label>
                <input id="username" name="username" type="text" required autocomplete="username" value="{{ request.form.get('username', '') }}">
            </div>
            <div class="auth-field">
                <label for="current_password">当前密码</label>
                <input id="current_password" name="current_password" type="password" required autocomplete="current-password">
            </div>
            <div class="auth-field">
                <label for="new_password">新密码</label>
                <input id="new_password" name="new_password" type="password" required autocomplete="new-password">
            </div>
            <div class="auth-field">
                <label for="confirm_password">确认新密码</label>
                <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password">
            </div>
            <div class="auth-field">
                <label for="captcha">图形验证码</label>
                <div class="captcha-row">
                    <img id="captcha-img" class="captcha-image" src="{{ url_for('auth.login_captcha') }}" alt="图形验证码">
                    <button id="btn-refresh-captcha" class="captcha-refresh" type="button">换一张</button>
                </div>
                <input id="captcha" name="captcha" type="text" required maxlength="8" placeholder="请输入验证码" autocomplete="off">
            </div>
            <button type="submit" class="primary-button auth-button">确认修改密码</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}">返回登录</a>
        </div>
    </div>
    <script>
        (function () {
            const img = document.getElementById('captcha-img');
            const btn = document.getElementById('btn-refresh-captcha');

            function refreshCaptcha() {
                if (!img) return;
                img.src = "{{ url_for('auth.login_captcha') }}?t=" + Date.now();
            }

            if (img) img.addEventListener('click', refreshCaptcha);
            if (btn) btn.addEventListener('click', refreshCaptcha);
        })();
    </script>
</body>
</html>

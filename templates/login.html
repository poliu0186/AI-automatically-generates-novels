<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>登录 - 小说创作助手</title>
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="{{ url_for('static', filename='cs.css') }}" />
    <style>
        body { background: #f5f7fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-wrapper { width: min(420px, 100%); padding: 28px; background: #fff; border-radius: 16px; box-shadow: 0 16px 40px rgba(0,0,0,0.08); }
        .auth-wrapper h2 { margin: 0 0 18px; color: #222; }
        .auth-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .auth-field label { color: #555; font-size: 14px; }
        .auth-field input { width: 100%; padding: 12px 14px; border: 1px solid #dce2ea; border-radius: 10px; font-size: 14px; }
        .captcha-row { display: flex; gap: 10px; align-items: center; }
        .captcha-image { width: 140px; height: 44px; border: 1px solid #dce2ea; border-radius: 10px; background: #f7f9ff; }
        .captcha-refresh { border: none; background: #eef3ff; color: #3557a6; border-radius: 10px; padding: 10px 12px; cursor: pointer; }
        .auth-button { width: 100%; margin-top: 10px; }
        .auth-footer { margin-top: 18px; color: #666; font-size: 14px; text-align: center; }
        .auth-footer a { color: var(--primary-color); text-decoration: none; }
        .message { margin-bottom: 14px; padding: 12px 14px; border-radius: 10px; font-size: 14px; }
        .message.success { background: #eaf7ef; color: #257a35; }
        .message.danger { background: #fdecea; color: #af2e2e; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <h2>登录小说创作助手</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <div class="auth-field">
                <label for="username">用户名</label>
                <input id="username" name="username" type="text" required autocomplete="username" value="{{ request.form.get('username', '') }}">
            </div>
            <div class="auth-field">
                <label for="password">密码</label>
                <input id="password" name="password" type="password" required autocomplete="current-password">
            </div>
            <div class="auth-field">
                <label for="captcha">图形验证码</label>
                <div class="captcha-row">
                    <img id="captcha-img" class="captcha-image" src="{{ url_for('auth.login_captcha') }}" alt="图形验证码">
                    <button id="btn-refresh-captcha" class="captcha-refresh" type="button">换一张</button>
                </div>
                <input id="captcha" name="captcha" type="text" required maxlength="8" placeholder="请输入验证码" autocomplete="off">
            </div>
            <button type="submit" class="primary-button auth-button">登录</button>
        </form>

        <div class="auth-footer">
            还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a> | <a id="forgot-password-link" href="{{ url_for('auth.forgot_password') }}">忘记密码</a> | <a href="{{ url_for('auth.change_password_page') }}">修改密码</a> | <a href="{{ url_for('auth.admin_login') }}">管理员登录</a>
        </div>
    </div>
    <script>
        (function () {
            const img = document.getElementById('captcha-img');
            const btn = document.getElementById('btn-refresh-captcha');
            const usernameInput = document.getElementById('username');
            const forgotPasswordLink = document.getElementById('forgot-password-link');

            function refreshCaptcha() {
                if (!img) return;
                img.src = "{{ url_for('auth.login_captcha') }}?t=" + Date.now();
            }

            if (img) img.addEventListener('click', refreshCaptcha);
            if (btn) btn.addEventListener('click', refreshCaptcha);
            if (forgotPasswordLink) {
                forgotPasswordLink.addEventListener('click', (event) => {
                    event.preventDefault();
                    const username = (usernameInput && usernameInput.value ? usernameInput.value.trim() : '');
                    const base = "{{ url_for('auth.forgot_password') }}";
                    const target = username ? (base + '?username=' + encodeURIComponent(username)) : base;
                    window.location.href = target;
                });
            }
        })();
    </script>
</body>
</html>

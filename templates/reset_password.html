<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 小说创作助手</title>
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="{{ url_for('static', filename='cs.css') }}" />
    <style>
        :root {
            --bg: #0a0e17;
            --ink: #eaf1ff;
            --muted: #9aa9c6;
            --line: #26324c;
            --card: #121c2f;
            --accent: #ff7a45;
            --accent-2: #3ec5b8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            background:
                radial-gradient(1000px 460px at 84% -10%, rgba(62,197,184,0.18), rgba(62,197,184,0) 70%),
                radial-gradient(700px 320px at -8% 20%, rgba(255,122,69,0.22), rgba(255,122,69,0) 68%),
                linear-gradient(180deg, #0a0f19 0%, #070b12 100%);
            font-family: "Manrope", "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 14px;
        }
        .auth-wrapper {
            width: min(430px, 100%);
            padding: 28px;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--line);
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.35);
        }
        .auth-wrapper h2 { margin: 0 0 18px; color: var(--ink); font-size: 24px; }
        .auth-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .auth-field label { color: var(--muted); font-size: 14px; }
        .auth-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #304160;
            border-radius: 10px;
            font-size: 14px;
            background: #0e1626;
            color: var(--ink);
        }
        .auth-field input:focus {
            outline: none;
            border-color: #4f73b8;
            box-shadow: 0 0 0 3px rgba(79, 115, 184, 0.22);
        }
        .auth-button {
            width: 100%;
            margin-top: 10px;
            border: none;
            border-radius: 999px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), #ff9a4d);
            box-shadow: 0 12px 30px rgba(255, 122, 69, 0.32);
            cursor: pointer;
        }
        .auth-footer { margin-top: 18px; color: var(--muted); font-size: 14px; text-align: center; }
        .auth-footer a { color: var(--accent-2); text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .message { margin-bottom: 14px; padding: 12px 14px; border-radius: 10px; font-size: 14px; border: 1px solid transparent; }
        .message.success { background: rgba(62, 197, 184, 0.14); color: #6ce9da; border-color: rgba(62, 197, 184, 0.4); }
        .message.danger { background: rgba(245, 95, 95, 0.14); color: #ff9999; border-color: rgba(245, 95, 95, 0.35); }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <h2>设置新密码</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <div class="auth-field">
                <label for="password">新密码</label>
                <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password">
            </div>
            <div class="auth-field">
                <label for="confirm_password">确认新密码</label>
                <input id="confirm_password" name="confirm_password" type="password" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="primary-button auth-button">重置密码</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}">返回登录</a>
        </div>
    </div>
</body>
</html>

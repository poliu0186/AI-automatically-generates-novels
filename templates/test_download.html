<!DOCTYPE html>
<html>
<head>
    <title>下载功能测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .chapter-container { margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .chapter-header { background: #f0f0f0; padding: 10px; cursor: pointer; display: flex; justify-content: space-between; }
        .chapter-content { padding: 10px; }
        .chapter-outline, .chapter-content-text { width: 100%; min-height: 80px; margin: 5px 0; padding: 5px; }
        h4 { margin: 10px 0 5px 0; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>小说下载功能测试</h1>

    <div class="test-section">
        <h3>1. 添加测试章节</h3>
        <button onclick="addTestChapters()">添加10个测试章节</button>
        <button onclick="clearChapters()">清空章节</button>
    </div>

    <div class="test-section">
        <h3>2. 章节容器</h3>
        <div id="chapters" style="border: 1px solid #ddd; padding: 10px; min-height: 200px;"></div>
    </div>

    <div class="test-section">
        <h3>3. 下载测试</h3>
        <button onclick="testDownload()">测试下载小说</button>
        <p>点击后应该弹出下载对话框</p>
    </div>

    <script>
        // 模拟添加测试章节
        function addTestChapters() {
            const chaptersContainer = document.getElementById('chapters');

            // 清空现有章节
            chaptersContainer.innerHTML = '';

            // 添加10个测试章节
            for (let i = 1; i <= 10; i++) {
                const chapterDiv = document.createElement('div');
                chapterDiv.className = 'chapter-container';
                chapterDiv.innerHTML = `
                    <div class="chapter-header">
                        <span>第${i}章：测试章节标题</span>
                        <span>▼</span>
                    </div>
                    <div class="chapter-content">
                        <div>
                            <h4>章节细纲</h4>
                            <textarea class="chapter-outline">第${i}章的细纲内容...</textarea>
                        </div>
                        <div>
                            <h4>章节正文</h4>
                            <textarea class="chapter-content-text">这是第${i}章的正文内容。

这是一个测试章节的内容。第${i}章的内容在这里，包含了一些故事情节和人物对话。

"你好，"张三说道，"这是第${i}章的对话内容。"

李四回答道："是的，这是一个很长的章节内容，用来测试下载功能是否正常工作。"

故事继续发展，展现了人物的性格特点和情节的转折。

章节结束。</textarea>
                        </div>
                    </div>
                `;
                chaptersContainer.appendChild(chapterDiv);
            }
        }

        function clearChapters() {
            document.getElementById('chapters').innerHTML = '';
        }

        // 测试下载功能
        function testDownload() {
            // 获取所有章节的正文内容
            const chapters = document.querySelectorAll('.chapter-container');
            let novelContent = '';

            console.log('找到的章节数量:', chapters.length);

            chapters.forEach((chapter, index) => {
                // 获取章节标题
                const chapterHeader = chapter.querySelector('.chapter-header span:first-child');
                const chapterTitle = chapterHeader ? chapterHeader.textContent.trim() : `第${index + 1}章`;

                // 获取章节正文内容
                const contentTextarea = chapter.querySelector('.chapter-content-text');
                const chapterContent = contentTextarea ? contentTextarea.value.trim() : '';

                console.log(`章节 ${index + 1} (${chapterTitle}): ${chapterContent.substring(0, 100)}...`);

                if (chapterContent) {
                    novelContent += `${chapterTitle}\n\n${chapterContent}\n\n`;
                }
            });

            if (!novelContent.trim()) {
                alert('没有找到章节正文内容，请先生成一些章节内容');
                return;
            }

            // 显示格式选择对话框
            showDownloadDialog(novelContent);
        }

        function showDownloadDialog(content) {
            const dialog = document.createElement('div');
            dialog.innerHTML = `
                <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10001;">
                    <div style="background: white; padding: 20px; border-radius: 8px; max-width: 400px; width: 90%;">
                        <h3 style="margin-top: 0;">下载小说</h3>
                        <div style="margin: 15px 0;">
                            <label style="display: block; margin-bottom: 10px;">
                                <input type="radio" name="format" value="txt" checked> TXT格式 (纯文本)
                            </label>
                            <label style="display: block; margin-bottom: 10px; color: #999;">
                                <input type="radio" name="format" value="docx" disabled> DOCX格式 (Word文档) - 暂不可用
                            </label>
                            <label style="display: block; margin-bottom: 10px; color: #999;">
                                <input type="radio" name="format" value="pdf" disabled> PDF格式 (PDF文档) - 暂不可用
                            </label>
                        </div>
                        <div style="margin: 15px 0;">
                            <label>文件名: <input type="text" id="novel-title" value="generated_novel" style="width: 200px; padding: 5px;"></label>
                        </div>
                        <div style="text-align: right;">
                            <button id="cancel-download" style="margin-right: 10px; padding: 8px 16px;">取消</button>
                            <button id="confirm-download" style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px;">下载</button>
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(dialog);

            document.getElementById('cancel-download').addEventListener('click', () => {
                document.body.removeChild(dialog);
            });

            document.getElementById('confirm-download').addEventListener('click', () => {
                const format = document.querySelector('input[name="format"]:checked').value;
                const title = document.getElementById('novel-title').value || 'generated_novel';

                performDownload(content, format, title);
                document.body.removeChild(dialog);
            });
        }

        function performDownload(content, format, title) {
            fetch('/download', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    content: content,
                    format: format,
                    title: title
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('下载失败');
                }
                return response.blob();
            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${title}.${format}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                alert('小说下载成功！');
            })
            .catch(error => {
                console.error('下载失败:', error);
                alert('下载失败: ' + error.message);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 小说创作助手</title>
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="{{ url_for('static', filename='cs.css') }}" />
    <style>
        :root {
            --bg: #0a0e17;
            --ink: #eaf1ff;
            --muted: #9aa9c6;
            --line: #26324c;
            --card: #121c2f;
            --accent: #ff7a45;
            --accent-2: #3ec5b8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            background:
                radial-gradient(1000px 460px at 84% -10%, rgba(62,197,184,0.18), rgba(62,197,184,0) 70%),
                radial-gradient(700px 320px at -8% 20%, rgba(255,122,69,0.22), rgba(255,122,69,0) 68%),
                linear-gradient(180deg, #0a0f19 0%, #070b12 100%);
            font-family: "Manrope", "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 14px;
        }
        .auth-wrapper {
            width: min(440px, 100%);
            padding: 28px;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--line);
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.35);
        }
        .auth-wrapper h2 { margin: 0 0 10px; color: var(--ink); }
        .auth-desc { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.7; }
        .auth-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .auth-field label { color: var(--muted); font-size: 14px; }
        .auth-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #304160;
            border-radius: 10px;
            font-size: 14px;
            background: #0e1626;
            color: var(--ink);
        }
        .auth-field input:focus {
            outline: none;
            border-color: #4f73b8;
            box-shadow: 0 0 0 3px rgba(79, 115, 184, 0.22);
        }
        .auth-button {
            width: 100%;
            margin-top: 10px;
            border: none;
            border-radius: 999px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), #ff9a4d);
            box-shadow: 0 12px 30px rgba(255, 122, 69, 0.32);
            cursor: pointer;
        }
        .auth-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            box-shadow: none;
        }
        .auth-footer { margin-top: 18px; color: var(--muted); font-size: 14px; text-align: center; }
        .auth-footer a { color: var(--accent-2); text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .message { margin-bottom: 14px; padding: 12px 14px; border-radius: 10px; font-size: 14px; border: 1px solid transparent; }
        .message.success { background: rgba(62, 197, 184, 0.14); color: #6ce9da; border-color: rgba(62, 197, 184, 0.4); }
        .message.danger { background: rgba(245, 95, 95, 0.14); color: #ff9999; border-color: rgba(245, 95, 95, 0.35); }
        .auth-hint { margin-top: 8px; color: #7f94bb; font-size: 12px; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <h2>找回密码</h2>
        <p class="auth-desc">请核对当前用户名与注册邮箱，我们会发送密码重置链接到对应邮箱。</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form id="forgot-password-form" method="post">
            <div class="auth-field">
                <label for="username_display">当前用户名</label>
                <input id="username_display" type="text" readonly value="{{ username or '' }}" placeholder="请从登录页带入用户名">
                <input name="username" type="hidden" value="{{ username or '' }}">
                <div class="auth-hint">用户名不可修改，用于确认你正在找回哪个账号的密码。</div>
            </div>
            <div class="auth-field">
                <label for="email">邮箱</label>
                <input id="email" name="email" type="email" required autocomplete="email" value="{{ request.form.get('email', '') }}">
            </div>
            <button id="btn-send-reset" type="submit" class="primary-button auth-button">发送重置链接</button>
        </form>

        <div class="auth-footer">
            想起密码了？<a href="{{ url_for('auth.login') }}">返回登录</a>
        </div>
    </div>
    <script>
        (function () {
            const btn = document.getElementById('btn-send-reset');
            const form = document.getElementById('forgot-password-form');
            let remain = Number("{{ cooldown_seconds or 0 }}") || 0;
            let sendingRecoveryTimer = null;

            function renderCooldown() {
                if (!btn) return;
                if (remain > 0) {
                    btn.disabled = true;
                    btn.textContent = '请稍候 ' + remain + ' 秒';
                } else {
                    btn.disabled = false;
                    btn.textContent = '发送重置链接';
                }
            }

            renderCooldown();
            if (remain > 0) {
                const timer = setInterval(() => {
                    remain -= 1;
                    renderCooldown();
                    if (remain <= 0) {
                        clearInterval(timer);
                    }
                }, 1000);
            }

            if (form && btn) {
                form.addEventListener('submit', () => {
                    if (btn.disabled) return;
                    btn.disabled = true;
                    btn.textContent = '发送中...';
                    // Network or SMTP timeout fallback: recover button if response is too slow.
                    sendingRecoveryTimer = setTimeout(() => {
                        btn.disabled = false;
                        btn.textContent = '发送重置链接';
                    }, 12000);
                });
                window.addEventListener('beforeunload', () => {
                    if (sendingRecoveryTimer) clearTimeout(sendingRecoveryTimer);
                });
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>找回密码 - 小说创作助手</title>
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="{{ url_for('static', filename='cs.css') }}" />
    <style>
        body { background: #f5f7fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-wrapper { width: min(420px, 100%); padding: 28px; background: #fff; border-radius: 16px; box-shadow: 0 16px 40px rgba(0,0,0,0.08); }
        .auth-wrapper h2 { margin: 0 0 10px; color: #222; }
        .auth-desc { margin: 0 0 18px; color: #666; font-size: 14px; line-height: 1.6; }
        .auth-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .auth-field label { color: #555; font-size: 14px; }
        .auth-field input { width: 100%; padding: 12px 14px; border: 1px solid #dce2ea; border-radius: 10px; font-size: 14px; }
        .auth-button { width: 100%; margin-top: 10px; }
        .auth-footer { margin-top: 18px; color: #666; font-size: 14px; text-align: center; }
        .auth-footer a { color: var(--primary-color); text-decoration: none; }
        .message { margin-bottom: 14px; padding: 12px 14px; border-radius: 10px; font-size: 14px; }
        .message.success { background: #eaf7ef; color: #257a35; }
        .message.danger { background: #fdecea; color: #af2e2e; }
        .auth-hint { margin-top: 8px; color: #76839a; font-size: 12px; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <h2>找回密码</h2>
        <p class="auth-desc">请核对当前用户名与注册邮箱，我们会发送密码重置链接到对应邮箱。</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form id="forgot-password-form" method="post">
            <div class="auth-field">
                <label for="username_display">当前用户名</label>
                <input id="username_display" type="text" readonly value="{{ username or '' }}" placeholder="请从登录页带入用户名">
                <input name="username" type="hidden" value="{{ username or '' }}">
                <div class="auth-hint">用户名不可修改，用于确认你正在找回哪个账号的密码。</div>
            </div>
            <div class="auth-field">
                <label for="email">邮箱</label>
                <input id="email" name="email" type="email" required autocomplete="email" value="{{ request.form.get('email', '') }}">
            </div>
            <button id="btn-send-reset" type="submit" class="primary-button auth-button">发送重置链接</button>
        </form>

        <div class="auth-footer">
            想起密码了？<a href="{{ url_for('auth.login') }}">返回登录</a>
        </div>
    </div>
    <script>
        (function () {
            const btn = document.getElementById('btn-send-reset');
            const form = document.getElementById('forgot-password-form');
            let remain = Number("{{ cooldown_seconds or 0 }}") || 0;
            let sendingRecoveryTimer = null;

            function renderCooldown() {
                if (!btn) return;
                if (remain > 0) {
                    btn.disabled = true;
                    btn.textContent = '请稍候 ' + remain + ' 秒';
                } else {
                    btn.disabled = false;
                    btn.textContent = '发送重置链接';
                }
            }

            renderCooldown();
            if (remain > 0) {
                const timer = setInterval(() => {
                    remain -= 1;
                    renderCooldown();
                    if (remain <= 0) {
                        clearInterval(timer);
                    }
                }, 1000);
            }

            if (form && btn) {
                form.addEventListener('submit', () => {
                    if (btn.disabled) return;
                    btn.disabled = true;
                    btn.textContent = '发送中...';
                    // Network or SMTP timeout fallback: recover button if response is too slow.
                    sendingRecoveryTimer = setTimeout(() => {
                        btn.disabled = false;
                        btn.textContent = '发送重置链接';
                    }, 12000);
                });
                window.addEventListener('beforeunload', () => {
                    if (sendingRecoveryTimer) clearTimeout(sendingRecoveryTimer);
                });
            }
        })();
    </script>
</body>
</html>
